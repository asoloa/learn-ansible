---
# ---------------------------------------------------------------------------
# Initialise swarm – idempotent, no-op when already active
# ---------------------------------------------------------------------------
- name: Initialise Docker Swarm
  community.docker.docker_swarm:
    state: present
    advertise_addr: "{{ swarm_advertise_addr }}"
    listen_addr: "{{ swarm_advertise_addr }}:{{ swarm_port }}"

# ---------------------------------------------------------------------------
# Retrieve join tokens and expose them as hostvars for worker nodes
# ---------------------------------------------------------------------------
- name: Retrieve swarm info and join tokens
  community.docker.docker_swarm_info:
    nodes: true
  register: swarm_info

- name: Expose join tokens as host facts
  ansible.builtin.set_fact:
    swarm_worker_token: "{{ swarm_info.swarm_facts.JoinTokens.Worker }}"
    swarm_manager_token: "{{ swarm_info.swarm_facts.JoinTokens.Manager }}"

# ---------------------------------------------------------------------------
# Verify and display swarm node list
# ---------------------------------------------------------------------------
- name: Show swarm node list
  ansible.builtin.debug:
    msg: "{{ swarm_info.nodes | map(attribute='Hostname') | list }}"

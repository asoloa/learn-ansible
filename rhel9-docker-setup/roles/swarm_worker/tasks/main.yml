---
# ---------------------------------------------------------------------------
# Join swarm – idempotent, no-op when already active
# ---------------------------------------------------------------------------
- name: Join Docker Swarm as worker
  community.docker.docker_swarm:
    state: join
    advertise_addr: "{{ ansible_host }}"
    join_token: "{{ hostvars[groups['swarm_managers'][0]]['swarm_worker_token'] }}"
    remote_addrs:
      - "{{ hostvars[groups['swarm_managers'][0]]['swarm_advertise_addr'] }}:{{ swarm_port }}"

# ---------------------------------------------------------------------------
# Verify the node appears as ready – queried from the manager
# ---------------------------------------------------------------------------
- name: Retrieve worker node info from swarm manager
  community.docker.docker_swarm_info:
    nodes: true
    nodes_filters:
      name: "{{ swarm_node_hostname }}"
  register: worker_node_info
  delegate_to: "{{ groups['swarm_managers'][0] }}"

- name: Assert worker node is active and ready in the swarm
  ansible.builtin.assert:
    that:
      - worker_node_info.nodes | length > 0
      - worker_node_info.nodes[0].Status == 'ready'
    fail_msg: "Worker node {{ swarm_node_hostname }} is not ready in the swarm. Check token and connectivity."
    success_msg: "Worker node {{ swarm_node_hostname }} is active and ready in the swarm."
